name: Release

on:
  release:
    types:
      - published
      - prereleased

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: 386
            ext: .exe
            ldflags: "-s -w -H=windowsgui"
          - goos: windows
            goarch: amd64
            ext: .exe
            ldflags: "-s -w -H=windowsgui"
          - goos: windows
            goarch: arm64
            ext: .exe
            ldflags: "-s -w -H=windowsgui"
          - goos: darwin
            goarch: amd64
            ext: ""
            ldflags: "-s -w"
          - goos: darwin
            goarch: arm64
            ext: ""
            ldflags: "-s -w"
          - goos: linux
            goarch: 386
            ext: ""
            ldflags: "-s -w"
          - goos: linux
            goarch: amd64
            ext: ""
            ldflags: "-s -w"
          - goos: linux
            goarch: arm64
            ext: ""
            ldflags: "-s -w"
          - goos: linux
            goarch: arm
            goarm: "7"
            ext: ""
            ldflags: "-s -w"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Derive version
        id: version
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          VERSION="${TAG_NAME#v}"
          VERSION="${VERSION//\//_}"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          EXT: ${{ matrix.ext }}
          LDFLAGS: ${{ matrix.ldflags }}
        run: |
          if [ -n "$GOARM" ]; then
            export GOARM="$GOARM"
          fi
          go build -trimpath -ldflags "$LDFLAGS" -o "slack-mod$EXT" ./

      - name: Package
        env:
          EXT: ${{ matrix.ext }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          ARCH_TAG="$GOARCH"
          if [ -n "$GOARM" ]; then
            ARCH_TAG="${ARCH_TAG}v${GOARM}"
          fi

          rm -rf package
          mkdir -p package/injection
          cp "slack-mod$EXT" package/
          cp -R injection/. package/injection/

          if [ "$GOOS" = "windows" ]; then
            cp patch-desktop.bat package/
          else
            cp patch-desktop.sh package/
            chmod +x package/patch-desktop.sh
          fi

          ARCHIVE="slack-mod_${GOOS}_${ARCH_TAG}_v${VERSION}.zip"
          (
            cd package
            zip -r "../$ARCHIVE" .
          )
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Upload assets to current release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/**/*.zip
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
